name: Android Build

# Builds a debug APK in the cloud on every push to master (and on demand),
# then publishes it to a rolling "android-latest" Release you can download on your phone.
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the Release

jobs:
  android:
    name: Build debug APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3   # standard Godot 4.6.3 + Android templates + SDK
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostics (what the image actually provides)
        run: |
          echo "HOME=$HOME"
          echo "--- Android templates in the image (/root) ---"
          ls -la /root/.local/share/godot/export_templates/4.6.3.stable/ 2>/dev/null | grep -iE "apk|aar" || echo "(no android templates at /root)"
          echo "ANDROID_HOME=$ANDROID_HOME"; ls "$ANDROID_HOME" 2>/dev/null | head || true
          echo "--- image editor_settings android lines ---"
          grep -iE "android_sdk_path|debug_keystore|java_sdk|jdk" /root/.config/godot/editor_settings-4.6.tres 2>/dev/null || echo "(no android lines in image editor_settings)"

      - name: Export Android debug APK
        env:
          HOME: /root   # use the image's pre-configured Godot/editor settings (SDK, templates, keystore)
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /root/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build
          godot --headless --verbose --export-debug "Android" build/the-dead-shift.apk
          echo "--- build output ---"
          ls -la build/

      - name: Publish rolling Release (android-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: The Dead Shift — latest Android (debug)
          body: "Auto-built debug APK. On your phone, download the .apk below and tap to install (allow installs from this source)."
          prerelease: true
          files: build/the-dead-shift.apk
