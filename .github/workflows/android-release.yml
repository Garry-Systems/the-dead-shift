name: Android Release Build

# Builds a release-SIGNED Android App Bundle (.aab) when a version tag (v*) is pushed,
# and attaches it to that tag's GitHub Release. This is separate from android.yml (which
# builds an unsigned/debug-signed .apk on every push to master for phone-testing) -- this
# workflow is for actual Play Console submissions.
#
# Signing key material lives ONLY in repo secrets (ANDROID_KEYSTORE_B64, ANDROID_KEYSTORE_PASS)
# -- see docs/RELEASE-SIGNING.md for how the upload keystore was generated, how the secrets
# were set, and how to rotate them if the key is ever lost or compromised.
on:
  push:
    tags:
      - 'v*'
  # Manual trigger (Actions tab / gh workflow run) — for testing the pipeline and for
  # re-running a release without re-pushing its tag. Tag-derived version stamping needs
  # a real vX.Y.Z ref; manual runs from master skip the stamp (HAS_KEYSTORE gating aside,
  # the stamp step also checks the ref shape).
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the .aab to the tag's Release

jobs:
  release:
    name: Build release AAB
    runs-on: ubuntu-latest
    # NOTE: the secrets context is NOT available in job-level `if` (it silently evaluates
    # empty, which would skip the job forever) — so the "no keystore yet" gate lives in the
    # first STEP below, which sets HAS_KEYSTORE for every later step to check.
    container:
      image: barichello/godot-ci:4.6.3   # same image/version as android.yml's debug build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Until the one-time keystore setup (docs/RELEASE-SIGNING.md) is done, end the run
      # green-with-a-notice instead of red: every later step is gated on HAS_KEYSTORE.
      - name: Check signing secrets
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "HAS_KEYSTORE=false" >> "$GITHUB_ENV"
            echo "::notice::Signing secrets not configured — skipping the release AAB build. Run the setup in docs/RELEASE-SIGNING.md, then re-push the tag."
          else
            echo "HAS_KEYSTORE=true" >> "$GITHUB_ENV"
          fi

      # Play rejects any upload whose versionCode isn't strictly greater than every prior
      # upload, so a hardcoded version/code=1 would work exactly once. Derive a monotonic
      # code from the tag (vMAJOR.MINOR.PATCH -> MAJOR*10000 + MINOR*100 + PATCH) and stamp
      # both presets, mirroring android.yml's debug stamp step (same ^-anchored seds).
      - name: Stamp Android version from the tag
        if: env.HAS_KEYSTORE == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          CODE=$(( MAJOR*10000 + MINOR*100 + PATCH ))
          echo "Stamping version/name=$TAG version/code=$CODE"
          sed -i "s#^version/code=.*#version/code=${CODE}#" export_presets.cfg
          sed -i "s#^version/name=.*#version/name=\"${TAG}\"#" export_presets.cfg

      - name: Decode upload keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          mkdir -p /root/release-keystore
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > /root/release-keystore/upload.keystore
          ls -la /root/release-keystore/

      # AAB export goes through Gradle, which needs the Android *build template* installed
      # in the project (the debug APK path doesn't). The godot-ci image ships the matching
      # android_source.zip with its export templates — install it headlessly. (This was the
      # "Android build template not installed" failure in run #1.)
      - name: Install Android build template
        if: env.HAS_KEYSTORE == 'true'
        run: |
          TPL_DIR="/root/.local/share/godot/export_templates"
          VER_DIR=$(ls "$TPL_DIR" | head -1)
          mkdir -p android/build
          unzip -q "$TPL_DIR/$VER_DIR/android_source.zip" -d android/build
          echo "$VER_DIR" > android/.build_version
          touch android/build/.gdignore
          echo "Installed build template $VER_DIR"

      - name: Export Android release AAB
        if: env.HAS_KEYSTORE == 'true'
        env:
          HOME: /root   # use the image's pre-configured Godot/editor settings (SDK, templates)
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /root/release-keystore/upload.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: upload
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          mkdir -p build
          godot --headless --verbose --export-release "Android Release" build/the-dead-shift.aab
          echo "--- build output ---"
          ls -la build/

      - name: Attach AAB to the tag's Release
        if: env.HAS_KEYSTORE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: The Dead Shift ${{ github.ref_name }}
          body: "Release-signed Android App Bundle for ${{ github.ref_name }}. Upload build/the-dead-shift.aab to the Play Console (App bundle explorer / Production or Testing track)."
          files: build/the-dead-shift.aab
